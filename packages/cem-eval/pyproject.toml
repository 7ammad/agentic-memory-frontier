[project]
name = "cem-eval"
version = "0.1.0"
description = "Evaluation harnesses for Causal Experience Memory"
requires-python = ">=3.11"
dependencies = ["cem-core", "pydantic>=2"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
